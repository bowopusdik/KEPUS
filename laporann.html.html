<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KEPUS - Laporan</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


body{
background:#f4f6f9;
}


.container{
display:flex;
min-height:100vh;
}


.sidebar{

width:250px;
background:#1f2937;
color:white;
padding:20px;

}


.logo{

font-size:22px;
font-weight:bold;
margin-bottom:30px;

}


.sidebar a{

display:block;
padding:12px;
color:white;
text-decoration:none;
border-radius:8px;
margin-bottom:8px;

}


.sidebar a:hover{

background:#374151;

}



.main{

flex:1;
padding:20px;

}


.header{

display:flex;
justify-content:space-between;
margin-bottom:20px;

}




.cards{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;

}



.card{

background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px #ddd;

}


.card h3{

color:#555;
font-size:14px;

}


.card p{

font-size:25px;
font-weight:bold;
margin-top:10px;

}





.box{

margin-top:20px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px #ddd;

}



.filter{

display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;

}


input,select{

padding:10px;
border:1px solid #ddd;
border-radius:8px;

}



button{

background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;

}




table{

width:100%;
border-collapse:collapse;

}


th,td{

padding:12px;
border-bottom:1px solid #ddd;

}



.status{

padding:5px 10px;
border-radius:20px;
font-size:12px;

}


.ok{

background:#d1fae5;
color:#065f46;

}


.wait{

background:#fff3cd;
color:#856404;

}



@media(max-width:768px){


.container{

display:block;

}


.sidebar{

width:100%;

}


.cards{

grid-template-columns:1fr;

}


.filter{

grid-template-columns:1fr;

}


table{

font-size:12px;

}

}


</style>


</head>



<body>



<div class="container">



<div class="sidebar">


<div class="logo">
KEPUS
</div>


<a href="index.html">
📊 Dashboard
</a>


<a href="data_spj.html">
📄 Data SPJ
</a>


<a href="verifikasi.html">
✅ Verifikasi
</a>


<a>
📑 Laporan
</a>


</div>






<div class="main">


<div class="header">


<h2>
Laporan SPJ
</h2>


<div>
Admin
</div>


</div>




<div class="cards">


<div class="card">

<h3>Total SPJ</h3>

<p>
120
</p>

</div>



<div class="card">

<h3>Total Nilai</h3>

<p>
Rp 350 Jt
</p>

</div>



<div class="card">

<h3>Selesai</h3>

<p>
80
</p>

</div>



</div>






<div class="box">


<h3>
Filter Laporan
</h3>


<br>


<div class="filter">


<input type="date">


<input type="date">


<select>

<option>
Semua Unit
</option>

<option>
Keuangan
</option>

<option>
Operasional
</option>

</select>


</div>



<br>


<button>
Tampilkan
</button>


<button>
Cetak
</button>




</div>







<div class="box">


<h3>
Rekap SPJ
</h3>


<br>



<table>


<tr>

<th>No</th>
<th>SPJ</th>
<th>Unit</th>
<th>Nilai</th>
<th>Status</th>

</tr>



<tr>

<td>1</td>

<td>SPJ-001</td>

<td>Keuangan</td>

<td>5.000.000</td>


<td>

<span class="status wait">
Menunggu
</span>

</td>

</tr>




<tr>

<td>2</td>

<td>SPJ-002</td>

<td>Operasional</td>

<td>8.500.000</td>


<td>

<span class="status ok">
Selesai
</span>

</td>

</tr>




</table>


</div>



</div>


</div>


</body>

</html>
