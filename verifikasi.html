<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KEPUS - Verifikasi</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


body{
background:#f4f6f9;
}


.container{
display:flex;
min-height:100vh;
}


.sidebar{

width:250px;
background:#1f2937;
color:white;
padding:20px;

}


.logo{

font-size:22px;
font-weight:bold;
margin-bottom:30px;

}


.sidebar a{

display:block;
color:white;
text-decoration:none;
padding:12px;
border-radius:8px;
margin-bottom:8px;

}


.sidebar a:hover{

background:#374151;

}



.main{

flex:1;
padding:20px;

}



.box{

background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px #ddd;

}



table{

width:100%;
border-collapse:collapse;

}


th,td{

padding:12px;
border-bottom:1px solid #ddd;

}



select{

padding:8px;
border-radius:8px;

}



button{

background:#2563eb;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;

}


</style>


</head>



<body>



<div class="container">



<div class="sidebar">


<div class="logo">
KEPUS
</div>


<a href="index.html">
📊 Dashboard
</a>


<a href="data_spj.html">
📄 Data SPJ
</a>


<a href="tambah_spj.html">
➕ Tambah SPJ
</a>


<a href="verifikasi.html">
✅ Verifikasi
</a>


<a href="laporan.html">
📑 Laporan
</a>



</div>





<div class="main">



<div class="box">


<h2>
Verifikasi SPJ
</h2>


<br>


<table>


<thead>


<tr>

<th>No</th>

<th>Surat Tugas</th>

<th>Pokja</th>

<th>Nilai</th>

<th>Status</th>

<th>Aksi</th>


</tr>


</thead>



<tbody id="tabelVerifikasi">


</tbody>



</table>



</div>



</div>


</div>





<script>


function tampilData(){



let data =
JSON.parse(localStorage.getItem("dataSPJ")) || [];



let tabel="";



data.forEach(function(spj,index){



tabel += `


<tr>


<td>${index+1}</td>


<td>${spj.nomorSuratTugas}</td>


<td>${spj.pokja}</td>


<td>Rp ${spj.nilaiSPJ}</td>



<td>


<select id="status${index}">


<option 
${spj.status=="Belum Ada SPJ"?"selected":""}>
Belum Ada SPJ
</option>


<option
${spj.status=="Belum Lengkap"?"selected":""}>
Belum Lengkap
</option>


<option
${spj.status=="Terverifikasi"?"selected":""}>
Terverifikasi
</option>


</select>


</td>



<td>


<button onclick="simpanStatus(${index})">

Simpan

</button>


</td>


</tr>


`;



});



document.getElementById("tabelVerifikasi")
.innerHTML=tabel;



}





function simpanStatus(index){



let data =
JSON.parse(localStorage.getItem("dataSPJ")) || [];



let status =
document.getElementById("status"+index).value;



data[index].status=status;



localStorage.setItem(
"dataSPJ",
JSON.stringify(data)
);



alert("Status berhasil diperbarui");



tampilData();


}




tampilData();



</script>



</body>

</html>
