<style>

body{

.rev{

<div>

<h2>KEPUS - Verifikasi SPJ</h2>

<p>Sistem Monitoring dan Verifikasi SPJ</p>

<div>

<a href="index.html" style="color:white;text-decoration:none;">
🏠 Dashboard
</a>

</div>

<h4>Total Nilai SPJ</h4>

<h2 class="total" id="totalNilai">
Rp 0

</option>

<thead>

<tr>

```html
<script>


// =======================
// AMBIL DATA
// =======================


let spj =
JSON.parse(localStorage.getItem("spj")) || [];


let dokumen =
JSON.parse(localStorage.getItem("dokumenSPJ")) || [];





// =======================
// TAMPIL DATA
// =======================


function tampilData(){


let tabel = "";

let cari =
document.getElementById("cari").value
.toLowerCase();


let filter =
document.getElementById("filterStatus").value;



let nomor=1;



spj.forEach((item,index)=>{


let teks =
(
item.kode +
" " +
item.pelaksana
)
.toLowerCase();



if(
!teks.includes(cari)
){

return;

}



if(
filter!="Semua" &&
item.status!=filter
){

return;

}





let file =
dokumen.find(
d=>d.kode==item.kode
);



let warna="menunggu";



if(item.status=="Revisi"){

warna="revisi";

}


if(item.status=="Selesai"){

warna="selesai";

}





tabel += `

<tr>


<td>${nomor++}</td>


<td>${item.kode}</td>


<td>${item.pelaksana}</td>


<td>

Rp ${Number(item.nilai)
.toLocaleString("id-ID")}

</td>



<td>

<span class="status ${warna}">

${item.status}

</span>

</td>



<td>


${
file ?

`

<a class="btn view"
target="_blank"
href="${file.url}">

👁 Lihat

</a>


<a class="btn download"
download="${file.nama}"
href="${file.url}">

⬇ Download

</a>

`

:

`

Belum ada

`

}


</td>




<td>



<input
type="file"
id="file${index}"
accept=".pdf,.jpg,.png">



<br>


<button
class="btn upload"
onclick="uploadFile('${item.kode}',${index})">

Upload

</button>



<br>


<button
class="btn revision"
onclick="ubahStatus('${item.kode}','Revisi')">

Revisi

</button>



<button
class="btn finish"
onclick="ubahStatus('${item.kode}','Selesai')">

Selesai

</button>



</td>


</tr>


`;



});




document
.getElementById("tabelSPJ")
.innerHTML=tabel;



hitung();



}









// =======================
// HITUNG STATISTIK
// =======================



function hitung(){



let total =
spj.reduce(
(a,b)=>a+Number(b.nilai),
0
);



let menunggu =
spj.filter(
x=>x.status=="Menunggu"
).length;



let revisi =
spj.filter(
x=>x.status=="Revisi"
).length;



let selesai =
spj.filter(
x=>x.status=="Selesai"
).length;





document
.getElementById("totalNilai")
.innerHTML =
"Rp "+
total.toLocaleString("id-ID");



document
.getElementById("jumlahMenunggu")
.innerHTML =
menunggu;



document
.getElementById("jumlahRevisi")
.innerHTML =
revisi;



document
.getElementById("jumlahSelesai")
.innerHTML =
selesai;



}









// =======================
// UPLOAD DOKUMEN
// =======================



function uploadFile(kode,index){



let input =
document.getElementById(
"file"+index
);



let file =
input.files[0];



if(!file){

alert(
"Pilih file terlebih dahulu"
);

return;

}




let reader =
new FileReader();




reader.onload=function(e){



dokumen =
dokumen.filter(
x=>x.kode!=kode
);



dokumen.push({

kode:kode,

nama:file.name,

url:e.target.result,

tanggal:
new Date()
.toLocaleString("id-ID")

});



localStorage.setItem(
"dokumenSPJ",
JSON.stringify(dokumen)
);




ubahStatus(
kode,
"Selesai"
);



alert(
"Dokumen berhasil diupload"
);



}




reader.readAsDataURL(file);



}








// =======================
// UBAH STATUS
// =======================



function ubahStatus(kode,status){



spj =
spj.map(x=>{


if(x.kode==kode){


return {

...x,

status:status

};


}



return x;


});



localStorage.setItem(
"spj",
JSON.stringify(spj)
);



spj =
JSON.parse(
localStorage.getItem("spj")
);



tampilData();



}








// FILTER


document
.getElementById("cari")
.onkeyup=tampilData;



document
.getElementById("filterStatus")
.onchange=tampilData;





tampilData();



</script>
