<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<title>Verifikasi SPJ</title>


<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}


.box{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px #ddd;

}


table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}


th,td{

padding:12px;
border-bottom:1px solid #ddd;

}


button{

padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;

}


.upload{

background:#2563eb;
color:white;

}


.view{

background:#16a34a;
color:white;

}


.download{

background:#f59e0b;
color:white;

}


</style>

</head>


<body>


<div class="box">


<h2>
✅ Verifikasi Dokumen SPJ
</h2>


<br>


<table>


<thead>

<tr>

<th>No</th>
<th>Kode SPJ</th>
<th>Pelaksana</th>
<th>Upload</th>
<th>Dokumen</th>

</tr>

</thead>



<tbody id="data">

</tbody>


</table>



</div>





<script>


let spj =
JSON.parse(localStorage.getItem("spj")) || [];



let dokumen =
JSON.parse(localStorage.getItem("dokumenSPJ")) || [];





let html="";



spj.forEach((x,i)=>{


let file =
dokumen.find(d=>d.kode==x.kode);



html+=`

<tr>

<td>${i+1}</td>

<td>${x.kode}</td>

<td>${x.pelaksana}</td>


<td>


<input 
type="file"
id="file${i}"
accept=".pdf,.jpg,.png">


<br><br>


<button 
class="upload"
onclick="uploadFile('${x.kode}',${i})">

Upload

</button>


</td>


<td>


${
file ?

`

<a 
class="view"
target="_blank"
href="${file.url}">

Lihat

</a>


<a 
class="download"
download="${file.nama}"
href="${file.url}">

Download

</a>

`

:

"Belum ada"

}


</td>


</tr>


`;

});



document.getElementById("data").innerHTML=html;







function uploadFile(kode,index){


let input =
document.getElementById("file"+index);



let file =
input.files[0];


if(!file){

alert("Pilih file dulu");

return;

}



let reader =
new FileReader();



reader.onload=function(e){


let data = {


kode:kode,

nama:file.name,

url:e.target.result


};



dokumen =
dokumen.filter(
x=>x.kode!=kode
);


dokumen.push(data);



localStorage.setItem(
"dokumenSPJ",
JSON.stringify(dokumen)
);



alert("Dokumen berhasil diupload");


location.reload();


}



reader.readAsDataURL(file);



}



</script>


</body>

</html>
