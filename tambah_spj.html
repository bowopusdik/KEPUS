<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KEPUS - Tambah SPJ</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


body{
background:#f4f6f9;
}


.container{
display:flex;
min-height:100vh;
}


/* SIDEBAR */

.sidebar{

width:250px;
background:#1f2937;
color:white;
padding:20px;

}


.logo{

font-size:22px;
font-weight:bold;
margin-bottom:30px;

}


.sidebar a{

display:block;
color:white;
text-decoration:none;
padding:12px;
margin-bottom:8px;
border-radius:8px;

}


.sidebar a:hover{

background:#374151;

}




.main{

flex:1;
padding:20px;

}



.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}



.box{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 3px 10px #ddd;

}




input,select{

width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;

}



button{

padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;

}


button:hover{

background:#1d4ed8;

}


.status-box{

margin-top:10px;

}



</style>

</head>


<body>



<div class="container">



<!-- SIDEBAR -->


<div class="sidebar">


<div class="logo">
KEPUS
</div>


<a href="index.html">
📊 Dashboard
</a>


<a href="data_spj.html">
📄 Data SPJ
</a>


<a href="tambah_spj.html">
➕ Tambah SPJ
</a>


<a href="verifikasi.html">
✅ Verifikasi SPJ
</a>


<a href="laporan.html">
📑 Laporan
</a>



</div>






<!-- MAIN -->


<div class="main">



<div class="header">


<h2>
Tambah Data SPJ
</h2>


<div>
Admin
</div>


</div>






<div class="box">



<h3>
Form Surat Tugas SPJ
</h3>


<br>




<label>
Nomor Surat Tugas
</label>


<input 
type="text"
placeholder="Contoh : ST-001/KEPUS/2026">





<label>
Tanggal Surat Tugas
</label>


<input 
type="date">





<label>
Pokja
</label>


<input 
type="text"
placeholder="Contoh : Pokja Pengadaan">






<label>
Nama Pemohon
</label>


<input 
type="text"
placeholder="Nama Pemohon">






<label>
Nilai SPJ
</label>


<input 
type="number"
placeholder="Jumlah Anggaran">





<label>
Status Verifikasi
</label>


<select>


<option>
Belum Ada SPJ
</option>


<option>
Belum Lengkap
</option>


<option>
Terverifikasi
</option>


</select>





<label>
Keterangan
</label>


<input 
type="text"
placeholder="Catatan Verifikasi">






<button onclick="simpan()">

💾 Simpan Data

</button>




</div>





</div>



</div>






<script>


function simpan(){


alert(
"Data berhasil disimpan menuju Verifikasi SPJ"
);


window.location.href="verifikasi.html";


}



</script>



</body>

</html>
