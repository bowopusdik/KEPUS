<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KEPUS - Tambah SPJ</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


body{
background:#f4f6f9;
}


.container{
display:flex;
min-height:100vh;
}


.sidebar{

width:250px;
background:#1f2937;
color:white;
padding:20px;

}


.logo{

font-size:22px;
font-weight:bold;
margin-bottom:30px;

}


.sidebar a{

display:block;
color:white;
text-decoration:none;
padding:12px;
border-radius:8px;
margin-bottom:8px;

}


.sidebar a:hover{

background:#374151;

}



.main{

flex:1;
padding:20px;

}



.box{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 3px 10px #ddd;

}



input,select,textarea{

width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;

}



button{

background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;

}



button:hover{

background:#1d4ed8;

}


</style>


</head>



<body>



<div class="container">



<div class="sidebar">


<div class="logo">
KEPUS
</div>


<a href="index.html">
📊 Dashboard
</a>


<a href="data_spj.html">
📄 Data SPJ
</a>


<a href="tambah_spj.html">
➕ Tambah SPJ
</a>


<a href="verifikasi.html">
✅ Verifikasi
</a>


<a href="laporan.html">
📑 Laporan
</a>


</div>





<div class="main">


<div class="box">


<h2>
Tambah SPJ
</h2>


<br>



<label>
Nomor Surat Tugas
</label>


<input 
id="nomorSuratTugas"
placeholder="Contoh : ST-001">





<label>
Tanggal Surat Tugas
</label>


<input 
type="date"
id="tanggalSuratTugas">





<label>
Pokja
</label>


<input
id="pokja"
placeholder="Nama Pokja">





<label>
Nama Pemohon
</label>


<input
id="pemohon"
placeholder="Nama Pelaksana">





<label>
Nilai SPJ
</label>


<input
id="nilai"
placeholder="5000000">





<label>
Keterangan
</label>


<textarea
id="keterangan">
</textarea>




<button onclick="simpanSPJ()">

💾 Simpan SPJ

</button>



</div>


</div>


</div>





<script>



function simpanSPJ(){



let data =
JSON.parse(localStorage.getItem("dataSPJ")) || [];




let spj={



id:Date.now(),


nomorSuratTugas:
document.getElementById("nomorSuratTugas").value,


tanggalSuratTugas:
document.getElementById("tanggalSuratTugas").value,


pokja:
document.getElementById("pokja").value,



namaPemohon:
document.getElementById("pemohon").value,



nilaiSPJ:
document.getElementById("nilai").value,



keterangan:
document.getElementById("keterangan").value,



status:
"Belum Ada SPJ",



tanggalInput:
new Date().toLocaleDateString()




};



data.push(spj);



localStorage.setItem(
"dataSPJ",
JSON.stringify(data)
);



alert("SPJ berhasil disimpan");



window.location.href="data_spj.html";



}




</script>



</body>

</html>
