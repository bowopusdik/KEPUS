<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KEPUS - Tambah SPJ</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


body{
background:#f4f6f9;
}


.container{
display:flex;
min-height:100vh;
}



/* SIDEBAR */

.sidebar{

width:250px;
background:#1f2937;
color:white;
padding:20px;

}


.logo{

font-size:22px;
font-weight:bold;
margin-bottom:30px;

}


.sidebar a{

display:block;
color:white;
text-decoration:none;
padding:12px;
margin-bottom:8px;
border-radius:8px;

}


.sidebar a:hover{

background:#374151;

}




/* MAIN */

.main{

flex:1;
padding:20px;

}



.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}


.menu{

display:none;
font-size:25px;

}




.box{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 3px 10px #ddd;

}





.form-group{

margin-bottom:15px;

}


label{

display:block;
margin-bottom:5px;
font-weight:bold;

}


input,
textarea,
select{

width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;

}



textarea{

height:100px;

}



button{

background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;

}


button:hover{

background:#1d4ed8;

}




.row{

display:grid;
grid-template-columns:1fr 1fr;
gap:15px;

}




@media(max-width:768px){


.container{

display:block;

}


.sidebar{

display:none;

}


.menu{

display:block;

}


.row{

grid-template-columns:1fr;

}


}


</style>

</head>


<body>


<div class="container">



<!-- SIDEBAR -->

<div class="sidebar">


<div class="logo">
KEPUS
</div>


<a href="index.html">
📊 Dashboard
</a>


<a href="data_spj.html">
📄 Data SPJ
</a>


<a href="#">
✅ Verifikasi
</a>


<a href="#">
📑 Laporan
</a>


<a href="#">
⚙ Pengaturan
</a>


</div>






<!-- MAIN -->

<div class="main">



<div class="header">


<div class="menu">
☰
</div>


<h2>
Tambah SPJ
</h2>


<div>
Admin
</div>


</div>





<div class="box">


<form>



<div class="row">


<div class="form-group">

<label>
Nomor SPJ
</label>

<input 
type="text"
placeholder="Contoh: SPJ-001"
>

</div>



<div class="form-group">

<label>
Tanggal SPJ
</label>

<input 
type="date"
>

</div>


</div>





<div class="row">


<div class="form-group">

<label>
Unit Kerja
</label>


<select>

<option>
Pilih Unit
</option>

<option>
Keuangan
</option>

<option>
Operasional
</option>

<option>
Umum
</option>


</select>


</div>





<div class="form-group">

<label>
Pemohon
</label>


<input 
type="text"
placeholder="Nama pemohon"
>


</div>


</div>






<div class="form-group">


<label>
Uraian Kegiatan
</label>


<textarea
placeholder="Keterangan SPJ">
</textarea>


</div>





<div class="form-group">


<label>
Nilai SPJ
</label>


<input
type="number"
placeholder="Rp"
>


</div>






<div class="form-group">


<label>
Upload Dokumen SPJ (PDF)
</label>


<input
type="file"
accept=".pdf"
>


</div>





<br>


<button type="submit">

Simpan SPJ

</button>



</form>


</div>


</div>


</div>


</body>

</html>
