```html
<script>


// ===============================
// SINKRON DASHBOARD DARI SPJ
// ===============================


function updateDashboard(){


let spj =
JSON.parse(localStorage.getItem("spj")) || [];




// TOTAL NILAI

let total =
spj.reduce(
(sum,item)=>
sum + Number(item.nilai),
0
);



// STATUS

let menunggu =
spj.filter(
x=>x.status=="Menunggu"
).length;


let revisi =
spj.filter(
x=>x.status=="Revisi"
).length;


let selesai =
spj.filter(
x=>x.status=="Selesai"
).length;





// CARD DASHBOARD

let totalEl =
document.getElementById("total");


if(totalEl){

totalEl.innerHTML =
"Rp "+
total.toLocaleString("id-ID");

}



let menungguEl =
document.getElementById("menunggu");


if(menungguEl){

menungguEl.innerHTML =
menunggu;

}



let revisiEl =
document.getElementById("revisi");


if(revisiEl){

revisiEl.innerHTML =
revisi;

}



let selesaiEl =
document.getElementById("selesai");


if(selesaiEl){

selesaiEl.innerHTML =
selesai;

}





// ===============================
// RUNNING TEXT
// ===============================


let pesan="";




// SPJ BELUM SELESAI

spj
.filter(
x=>x.status=="Menunggu"
)
.forEach(x=>{


pesan +=

` ⚠️ ${x.pelaksana} belum menyerahkan dokumen ${x.kode} | `;


});




// SPJ REVISI


spj
.filter(
x=>x.status=="Revisi"
)
.forEach(x=>{


pesan +=

` 🔴 ${x.pelaksana} harus memperbaiki ${x.kode} | `;


});





if(pesan==""){


pesan =
" ✅ Semua SPJ telah selesai diverifikasi ";


}




let running =
document.getElementById(
"runningText"
);



if(running){

running.innerHTML =
pesan;

}



}





// jalankan

updateDashboard();


// update otomatis setiap kembali ke dashboard

window.addEventListener(
"storage",
updateDashboard
);



</script>
```
