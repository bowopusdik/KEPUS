<script>


// ===============================
// UPDATE DASHBOARD DARI DATA SPJ
// ===============================


function updateDashboard(){


let dataSPJ =
JSON.parse(localStorage.getItem("dataSPJ")) || [];




// TOTAL NILAI SPJ

let total =
dataSPJ.reduce(
(sum,item)=>
sum + Number(
item.nilaiSPJ || 0
),
0
);





// STATUS

let menunggu =
dataSPJ.filter(
x=>(x.status || "Menunggu")=="Menunggu"
).length;



let revisi =
dataSPJ.filter(
x=>x.status=="Revisi"
).length;



let selesai =
dataSPJ.filter(
x=>x.status=="Selesai"
).length;






// ===============================
// CARD DASHBOARD
// ===============================


let totalEl =
document.getElementById("total");


if(totalEl){

totalEl.innerHTML =
"Rp " +
total.toLocaleString("id-ID");

}



let menungguEl =
document.getElementById("menunggu");


if(menungguEl){

menungguEl.innerHTML =
menunggu;

}




let revisiEl =
document.getElementById("revisi");


if(revisiEl){

revisiEl.innerHTML =
revisi;

}





let selesaiEl =
document.getElementById("selesai");


if(selesaiEl){

selesaiEl.innerHTML =
selesai;

}







// ===============================
// RUNNING TEXT
// ===============================


let pesan="";




// MENUNGGU = KUNING

dataSPJ
.filter(
x=>(x.status || "Menunggu")=="Menunggu"
)
.forEach(x=>{


pesan += `

<span style="
color:#facc15;
font-weight:bold;
">

⚠️ ${x.pokja}
belum menyerahkan SPJ
${x.nomorSuratTugas}

</span>

&nbsp;&nbsp; | &nbsp;&nbsp;

`;

});






// REVISI = MERAH


dataSPJ
.filter(
x=>x.status=="Revisi"
)
.forEach(x=>{


pesan += `


<span style="
color:#ef4444;
font-weight:bold;
">

🔴 ${x.pokja}
harus memperbaiki SPJ
${x.nomorSuratTugas}

</span>


&nbsp;&nbsp; | &nbsp;&nbsp;


`;

});







if(pesan==""){


pesan=`

<span style="
color:#22c55e;
font-weight:bold;
">

✅ Semua SPJ telah selesai diverifikasi

</span>

`;

}



let running =
document.getElementById(
"runningText"
);



if(running){

running.innerHTML =
pesan;

}


}




// jalankan saat halaman dibuka

updateDashboard();




// refresh jika data berubah

window.addEventListener(
"storage",
updateDashboard
);



</script>
