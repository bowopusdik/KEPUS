<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KEPUS Dashboard</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


body{

background:#eef2f7;

}


.container{

display:flex;
min-height:100vh;

}



.sidebar{

width:240px;
background:#111827;
color:white;
padding:20px;

}



.logo{

font-size:26px;
font-weight:bold;
margin-bottom:30px;

}



.sidebar a{

display:block;
color:white;
text-decoration:none;
padding:12px;
border-radius:8px;
margin-bottom:8px;

}


.sidebar a:hover{

background:#374151;

}



.main{

flex:1;
padding:25px;

}




.cards{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;

}



.card{

background:white;
padding:25px;
border-radius:18px;
box-shadow:0 5px 15px #ddd;

}


.card h3{

color:#666;

}



.card h2{

font-size:28px;
margin-top:15px;

}


.blue{

color:#2563eb;

}


.yellow{

color:#eab308;

}


.red{

color:#dc2626;

}


.green{

color:#16a34a;

}




.running{

margin-top:25px;
background:#1f2937;
padding:15px;
border-radius:10px;
height:45px;
overflow:hidden;

}






table{

width:100%;
margin-top:25px;
background:white;
border-collapse:collapse;
border-radius:15px;
overflow:hidden;

}



th{

background:#005baa;
color:white;

}



td,th{

padding:14px;
border-bottom:1px solid #ddd;

}



</style>

</head>


<body>



<div class="container">





<div class="sidebar">


<div class="logo">

KEPUS

</div>



<a href="index.html">
📊 Dashboard
</a>


<a href="data_spj.html">
📄 Data SPJ
</a>


<a href="tambah_spj.html">
➕ Tambah SPJ
</a>


<a href="verifikasi.html">
✅ Verifikasi
</a>


<a href="laporan.html">
📑 Laporan
</a>



</div>









<div class="main">


<h2>
Dashboard SPJ
</h2>



<br>





<div class="cards">



<div class="card">

<h3>
Total SPJ
</h3>


<h2
id="total"
class="blue">

Rp 0

</h2>

</div>





<div class="card">

<h3>
Menunggu
</h3>


<h2
id="menunggu"
class="yellow">

0

</h2>


</div>







<div class="card">


<h3>
Revisi
</h3>


<h2
id="revisi"
class="red">

0

</h2>


</div>







<div class="card">


<h3>
Selesai
</h3>


<h2
id="selesai"
class="green">

0

</h2>


</div>




</div>










<div 
id="runningText"
class="running">

Memuat informasi...

</div>









<table>


<thead>

<tr>

<th>No</th>

<th>Nomor Surat</th>

<th>Pokja</th>

<th>Nilai</th>

<th>Status</th>

</tr>

</thead>



<tbody id="tabelDashboard">


</tbody>



</table>







</div>

</div>









<script>





function loadDashboard(){



let data =

JSON.parse(

localStorage.getItem("dataSPJ")

) || [];






// TOTAL NILAI


let total =

data.reduce(

(sum,item)=>{


return sum +

Number(
item.nilaiSPJ || 0
);


},

0

);








// STATUS



let menunggu =

data.filter(

x=>

(x.status || "Menunggu")

=="Menunggu"

).length;





let revisi =

data.filter(

x=>

x.status=="Revisi"

).length;





let selesai =

data.filter(

x=>

x.status=="Selesai"

).length;







document
.getElementById("total")
.innerHTML =

"Rp "+
total.toLocaleString("id-ID");




document
.getElementById("menunggu")
.innerHTML =
menunggu;




document
.getElementById("revisi")
.innerHTML =
revisi;




document
.getElementById("selesai")
.innerHTML =
selesai;









// =================
// RUNNING TEXT
// =================


let pesan="";






data

.filter(

x=>

(x.status||"Menunggu")

=="Menunggu"

)

.forEach(x=>{


pesan +=


`

<span style="
color:#facc15;
font-weight:bold">

🟡 ${x.pokja}
belum menyerahkan SPJ
${x.nomorSuratTugas}

</span>

&nbsp; | &nbsp;

`;


});








data

.filter(

x=>

x.status=="Revisi"

)

.forEach(x=>{


pesan +=


`

<span style="
color:#ef4444;
font-weight:bold">

🔴 ${x.pokja}
SPJ perlu revisi
${x.nomorSuratTugas}

</span>

&nbsp; | &nbsp;

`;

});









if(pesan==""){


pesan=

`

<span style="
color:#22c55e">

🟢 Semua SPJ sudah selesai

</span>

`;

}



document
.getElementById("runningText")
.innerHTML =
pesan;









// =================
// TABEL
// =================



let tabel="";



data

.slice(-5)

.reverse()

.forEach(

(x,i)=>{


tabel +=


`

<tr>


<td>${i+1}</td>


<td>
${x.nomorSuratTugas}
</td>


<td>
${x.pokja}
</td>


<td>

Rp ${Number(x.nilaiSPJ)
.toLocaleString("id-ID")}

</td>


<td>

${x.status || "Menunggu"}

</td>


</tr>

`;



});






document
.getElementById("tabelDashboard")
.innerHTML =
tabel;







}








// pertama kali

loadDashboard();




// update otomatis

window.addEventListener(

"storage",

loadDashboard

);



</script>



</body>

</html>
