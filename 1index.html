<script>


function loadDashboard(){


let data =
JSON.parse(localStorage.getItem("dataSPJ")) || [];



// cek data
console.log("DATA SPJ :",data);





// TOTAL NILAI

let total = 0;


data.forEach(item=>{


total += Number(

item.nilaiSPJ ||
item.nilai ||
0

);


});






// STATUS

let menunggu =
0;

let revisi =
0;

let selesai =
0;




data.forEach(item=>{


let status =
item.status ||
"Menunggu";



if(status=="Menunggu"){

menunggu++;

}


if(status=="Revisi"){

revisi++;

}


if(status=="Selesai"){

selesai++;

}


});






// TAMPIL CARD


document.getElementById("total")
.innerHTML =
"Rp "+
total.toLocaleString("id-ID");



document.getElementById("menunggu")
.innerHTML =
menunggu;



document.getElementById("revisi")
.innerHTML =
revisi;



document.getElementById("selesai")
.innerHTML =
selesai;







// RUNNING TEXT


let pesan="";



data.forEach(item=>{


let status =
item.status ||
"Menunggu";



let nomor =
item.nomorSuratTugas ||
item.kode ||
"-";



let nama =
item.pokja ||
item.pelaksana ||
"-";






if(status=="Menunggu"){


pesan +=

`
<span style="
color:#facc15;
font-weight:bold">

🟡 ${nama}
belum menyerahkan SPJ ${nomor}

</span>
&nbsp; | &nbsp;

`;

}




if(status=="Revisi"){


pesan +=


`
<span style="
color:#ef4444;
font-weight:bold">

🔴 ${nama}
SPJ ${nomor} perlu revisi

</span>

&nbsp; | &nbsp;

`;


}



});






if(pesan==""){


pesan=

`
<span style="color:#22c55e">
🟢 Semua SPJ selesai diverifikasi
</span>
`;

}




document
.getElementById("runningText")
.innerHTML =
pesan;







// TABEL


let html="";



data.slice(-5).reverse()
.forEach((item,index)=>{


html += `


<tr>


<td>
${index+1}
</td>


<td>
${item.nomorSuratTugas || item.kode || "-"}
</td>


<td>
${item.pokja || item.pelaksana || "-"}
</td>


<td>

Rp ${Number(
item.nilaiSPJ ||
item.nilai ||
0
).toLocaleString("id-ID")}

</td>


<td>

${item.status || "Menunggu"}

</td>


</tr>

`;



});



document
.getElementById("tabelDashboard")
.innerHTML =
html;



}







// load awal

loadDashboard();



// tombol refresh otomatis

setInterval(
loadDashboard,
1000
);



</script>
