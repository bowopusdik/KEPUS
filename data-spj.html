
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data SPJ</title>

  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="main">

  <h1>Data SPJ</h1>

  <table border="1" width="100%">
    <thead>
      <tr>
        <th>No</th>
        <th>No Surat</th>
        <th>Pokja</th>
        <th>Nilai</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="tabelSPJ"></tbody>
  </table>

</div>

<script src="assets/js/storage.js"></script>

<script>
function loadData(){

  const data = getDataSPJ();
  let html = "";

  data.forEach((item, i) => {
    html += `
      <tr>
        <td>${i+1}</td>
        <td>${item.nomorSurat}</td>
        <td>${item.pokja}</td>
        <td>Rp ${Number(item.nilaiSPJ).toLocaleString("id-ID")}</td>
        <td>${item.status}</td>
      </tr>
    `;
  });

  document.getElementById("tabelSPJ").innerHTML = html;
}

loadData();
</script>

</body>
</html>
