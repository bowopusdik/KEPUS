```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KEPUS Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f6f9;
}


.container{
display:flex;
min-height:100vh;
}


/* SIDEBAR */

.sidebar{
width:240px;
background:#111827;
color:white;
padding:20px;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:30px;
}


.sidebar a{
display:block;
padding:12px;
margin-bottom:8px;
color:white;
text-decoration:none;
border-radius:8px;
}


.sidebar a:hover,
.active{
background:#2563eb;
}


/* MAIN */

.main{
flex:1;
padding:25px;
}


.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}


.user{
background:white;
padding:10px 15px;
border-radius:10px;
}



/* CARD */

.cards{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;

}


.card{

background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px #ddd;

}


.card h4{
color:#666;
}


.card h1{
margin-top:10px;
}




.content{

display:grid;
grid-template-columns:1fr 2fr;
gap:20px;
margin-top:20px;

}



.box{

background:white;
padding:20px;
border-radius:15px;

box-shadow:0 3px 10px #ddd;

}



table{

width:100%;
border-collapse:collapse;

}


td,th{

padding:12px;
border-bottom:1px solid #ddd;

}



.badge{

padding:5px 10px;
border-radius:20px;

}


.wait{

background:#fff3cd;

}

.ok{

background:#d1fae5;

}

.revisi{

background:#fee2e2;

}



button{

border:none;
background:#dc2626;
color:white;
padding:8px 15px;
border-radius:8px;
cursor:pointer;

}




@media(max-width:800px){

.sidebar{

position:fixed;
left:-250px;
height:100%;

}


.sidebar.show{

left:0;

}


.cards,
.content{

grid-template-columns:1fr;

}

}


</style>

</head>


<body>


<div class="container">



<!-- MENU -->

<div class="sidebar" id="sidebar">


<div class="logo">
KEPUS
</div>


<a class="active" href="index.html">
📊 Dashboard
</a>


<a href="data_spj.html">
📄 Data SPJ
</a>


<a href="tambah_spj.html">
➕ Tambah SPJ
</a>


<a href="verifikasi.html">
✅ Verifikasi
</a>


<a href="laporan.html">
📑 Laporan
</a>


<button onclick="logout()">
Logout
</button>


</div>





<div class="main">


<div class="header">


<h2>
Dashboard SPJ
</h2>


<div class="user">

👤 <span id="nama"></span>

</div>


</div>





<div class="cards">


<div class="card">
<h4>Total SPJ</h4>
<h1 id="total">0</h1>
</div>


<div class="card">
<h4>Menunggu</h4>
<h1 id="menunggu">0</h1>
</div>


<div class="card">
<h4>Selesai</h4>
<h1 id="selesai">0</h1>
</div>


<div class="card">
<h4>Revisi</h4>
<h1 id="revisi">0</h1>
</div>


</div>





<div class="content">



<div class="box">

<h3>Status</h3>

<br>

<p>🟡 Menunggu : <span id="s1"></span></p>

<br>

<p>🟢 Selesai : <span id="s2"></span></p>

<br>

<p>🔴 Revisi : <span id="s3"></span></p>


</div>





<div class="box">


<h3>SPJ Terbaru</h3>

<br>


<table>

<tr>
<th>No</th>
<th>Kode</th>
<th>Status</th>
</tr>


<tbody id="data">

</tbody>


</table>


</div>


</div>



</div>


</div>






<script>


// LOGIN CHECK

let user =
JSON.parse(localStorage.getItem("userLogin"));


if(!user){

window.location.href="login.html";

}



document.getElementById("nama").innerHTML =
user.nama;





// DATA

let spj =
JSON.parse(localStorage.getItem("spj")) || [

{
kode:"SPJ-001",
status:"Menunggu"
},

{
kode:"SPJ-002",
status:"Selesai"
},

{
kode:"SPJ-003",
status:"Revisi"
}

];





let total=spj.length;


let menunggu =
spj.filter(x=>x.status=="Menunggu").length;


let selesai =
spj.filter(x=>x.status=="Selesai").length;


let revisi =
spj.filter(x=>x.status=="Revisi").length;





document.getElementById("total").innerHTML=total;
document.getElementById("menunggu").innerHTML=menunggu;
document.getElementById("selesai").innerHTML=selesai;
document.getElementById("revisi").innerHTML=revisi;


s1.innerHTML=menunggu;
s2.innerHTML=selesai;
s3.innerHTML=revisi;





let html="";


spj.forEach((x,i)=>{

html+=`

<tr>

<td>${i+1}</td>

<td>${x.kode}</td>

<td>

<span class="badge">

${x.status}

</span>

</td>

</tr>

`;

});


data.innerHTML=html;






function logout(){

localStorage.removeItem("userLogin");

location.href="login.html";

}


</script>


</body>
</html>
```
