<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KEPUS Dashboard</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}


body{
margin:0;
background:#eef2f7;
}



.sidebar{

position:fixed;
width:230px;
height:100%;
background:#111827;
color:white;
padding:20px;

}



.sidebar h2{
margin-bottom:30px;
}


.sidebar a{

display:block;
color:white;
text-decoration:none;
padding:12px;
border-radius:8px;

}


.sidebar a:hover{

background:#374151;

}



.main{

margin-left:230px;
padding:25px;

}




.cards{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;

}



.card{

background:white;
padding:20px;
border-radius:15px;
box-shadow:0 4px 15px #ddd;

}



.card h2{

font-size:28px;

}


.total{
color:#2563eb;
}

.wait{
color:#eab308;
}

.rev{
color:#dc2626;
}

.done{
color:#16a34a;
}





.running{

margin-top:20px;
background:#111827;
padding:15px;
border-radius:10px;
overflow:hidden;

}





table{

margin-top:20px;
width:100%;
background:white;
border-collapse:collapse;

}


th{

background:#005baa;
color:white;

}


td,th{

padding:12px;
border-bottom:1px solid #ddd;

}



</style>


</head>



<body>



<div class="sidebar">


<h2>
KEPUS
</h2>


<a href="index.html">
📊 Dashboard
</a>


<a href="data_spj.html">
📄 Data SPJ
</a>


<a href="tambah_spj.html">
➕ Tambah SPJ
</a>


<a href="verifikasi.html">
✅ Verifikasi
</a>



</div>







<div class="main">


<h1>
Dashboard SPJ
</h1>




<div class="cards">



<div class="card">

<h3>Total SPJ</h3>

<h2 id="total" class="total">
Rp 0
</h2>

</div>




<div class="card">

<h3>Menunggu</h3>

<h2 id="menunggu" class="wait">
0
</h2>

</div>





<div class="card">

<h3>Revisi</h3>

<h2 id="revisi" class="rev">
0
</h2>

</div>





<div class="card">

<h3>Selesai</h3>

<h2 id="selesai" class="done">
0
</h2>

</div>



</div>







<div id="runningText"
class="running">

Memuat informasi...

</div>







<table>


<thead>

<tr>

<th>No</th>
<th>No Surat</th>
<th>Pokja</th>
<th>Nilai</th>
<th>Status</th>

</tr>


</thead>


<tbody id="tabelDashboard">

</tbody>


</table>






</div>









<script>


function updateDashboard(){



let data =
JSON.parse(
localStorage.getItem("dataSPJ")
) || [];





// TOTAL NILAI


let total=0;


data.forEach(x=>{

total += Number(
x.nilaiSPJ || 0
);

});







let menunggu =
data.filter(
x=>(x.status || "Menunggu")
=="Menunggu"
).length;




let revisi =
data.filter(
x=>x.status=="Revisi"
).length;




let selesai =
data.filter(
x=>x.status=="Selesai"
).length;







document
.getElementById("total")
.innerHTML =
"Rp "+
total.toLocaleString("id-ID");




document
.getElementById("menunggu")
.innerHTML =
menunggu;



document
.getElementById("revisi")
.innerHTML =
revisi;



document
.getElementById("selesai")
.innerHTML =
selesai;









// RUNNING TEXT


let teks="";




data
.filter(
x=>(x.status || "Menunggu")
=="Menunggu"
)
.forEach(x=>{


teks +=

`

<span style="
color:#facc15;
font-weight:bold">

🟡 ${x.pokja}
belum menyerahkan SPJ
${x.nomorSuratTugas}

</span>
&nbsp; | &nbsp;

`;


});







data
.filter(
x=>x.status=="Revisi"
)
.forEach(x=>{


teks +=


`

<span style="
color:#ef4444;
font-weight:bold">

🔴 ${x.pokja}
SPJ revisi
${x.nomorSuratTugas}

</span>

&nbsp; | &nbsp;

`;

});







if(teks==""){


teks=

`

<span style="
color:#22c55e">

🟢 Semua SPJ selesai

</span>

`;

}





document
.getElementById("runningText")
.innerHTML =
teks;







// TABEL DASHBOARD



let html="";



data
.slice(-5)
.reverse()
.forEach((x,i)=>{


html +=

`

<tr>

<td>${i+1}</td>

<td>
${x.nomorSuratTugas || "-"}
</td>


<td>
${x.pokja || "-"}
</td>


<td>
Rp ${Number(x.nilaiSPJ||0)
.toLocaleString("id-ID")}
</td>


<td>
${x.status || "Menunggu"}
</td>


</tr>

`;



});





document
.getElementById("tabelDashboard")
.innerHTML =
html;



}





// jalankan

updateDashboard();



// refresh otomatis

setInterval(
updateDashboard,
1000
);



</script>



</body>
</html>
