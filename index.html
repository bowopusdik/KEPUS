<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring SPJ</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
    <h1>📊 Dashboard Monitoring SPJ</h1>
    <p>Monitoring Kelengkapan Dokumen SPJ</p>
</header>

<section class="cards">

    <div class="card">
        <h2>10</h2>
        <p>Total SPJ</p>
    </div>

    <div class="card">
        <h2>7</h2>
        <p>Lengkap</p>
    </div>

    <div class="card">
        <h2>3</h2>
        <p>Belum Lengkap</p>
    </div>

</section>

<section class="search-box">

<input
type="text"
id="searchInput"
placeholder="🔍 Cari SPJ..."
onkeyup="searchTable()">

</section>

<section class="table-container">

<table>

<thead>

<tr>

<th>No</th>

<th>Nomor SPM</th>

<th>Total</th>

<th>Status</th>

<th>Aksi</th>

</tr>

</thead>

<tbody>

<tr>

<td>1</td>

<td>SPM-001</td>

<td>15.000.000</td>

<td>Lengkap</td>

<td>

<button
onclick="openModal(
'SPM-001',
'15.000.000',
['DRPP'],
'SPBY-001',
'KW-001',
['ST-001']
)">
Detail
</button>

</td>

</tr>

<tr>

<td>2</td>

<td>SPM-002</td>

<td>8.500.000</td>

<td>Belum Lengkap</td>

<td>

<button
onclick="openModal(
'SPM-002',
'8.500.000',
['DRPP'],
'SPBY-002',
'KW-002',
['ST-002']
)">
Detail
</button>

</td>

</tr>

<tr>

<td>3</td>

<td>SPM-003</td>

<td>25.000.000</td>

<td>Lengkap</td>

<td>

<button
onclick="openModal(
'SPM-003',
'25.000.000',
['DRPP'],
'SPBY-003',
'KW-003',
['ST-003']
)">
Detail
</button>

</td>

</tr>

</tbody>

</table>

</section>

<div id="spjModal" class="modal">

<div class="modal-content">

<span class="close"
onclick="closeModal()">
&times;
</span>

<h2 id="modalTitle"></h2>

<div id="modalBody"></div>

<div class="modal-buttons">

<button onclick="previewFile()">
📄 Preview PDF
</button>

<button onclick="downloadZIP()">
⬇ Download ZIP
</button>

</div>

</div>

</div>

<footer>

<p>
© 2025 Dashboard Monitoring SPJ
</p>

</footer>

<script src="app.js"></script>

</body>
</html>
