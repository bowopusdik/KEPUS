<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SPJ System</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="title">📁 SISTEM ARSIP SPJ</div>

  <div class="toolbar">
    <input id="searchInput" onkeyup="searchTable()" placeholder="🔍 Search SPJ...">

    <button class="btn-primary" onclick="openForm()">➕ Tambah SPJ</button>
  </div>
</div>

<!-- FORM ADD -->
<div id="formBox" class="form-box">
  <h3>➕ Tambah SPJ</h3>

  <input id="spm" placeholder="Nomor SPM">
  <input id="total" placeholder="Total">
  <input id="drpp" placeholder="DRPP (pisahkan koma)">
  <input id="spby" placeholder="SPBY">
  <input id="kw" placeholder="KW">
  <input id="st" placeholder="ST (pisahkan koma)">

  <input type="file" id="fileInput">

  <button onclick="saveSPJ()">Simpan</button>
  <button onclick="closeForm()">Tutup</button>
</div>

<!-- TABLE -->
<div class="table-container">
<table>
<thead>
<tr>
  <th>VIEW</th>
  <th>SPM</th>
  <th>TOTAL</th>
  <th>DRPP</th>
  <th>SPBY</th>
  <th>KW</th>
  <th>FILE</th>
  <th>AKSI</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()" class="close">✖</span>
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
