<script>

// ambil data SPJ dari input

let spj = JSON.parse(localStorage.getItem("spj")) || [];



// HITUNG TOTAL NILAI

let totalNilai = spj.reduce(
    (jumlah,item)=> jumlah + Number(item.nilai),
    0
);



// STATUS

let menunggu = spj.filter(
x=>x.status=="Menunggu"
).length;


let selesai = spj.filter(
x=>x.status=="Selesai"
).length;


let revisi = spj.filter(
x=>x.status=="Revisi"
).length;



// tampil dashboard

document.getElementById("total").innerHTML =
"Rp " + totalNilai.toLocaleString("id-ID");


document.getElementById("menunggu").innerHTML =
menunggu;


document.getElementById("selesai").innerHTML =
selesai;


document.getElementById("revisi").innerHTML =
revisi;



// status

s1.innerHTML=menunggu;
s2.innerHTML=selesai;
s3.innerHTML=revisi;






// TABEL SPJ TERBARU


let tabel="";


spj.slice(-5).reverse().forEach((item,index)=>{


let warna="";


if(item.status=="Menunggu")
warna="wait";


if(item.status=="Selesai")
warna="ok";


if(item.status=="Revisi")
warna="revisi";



tabel += `

<tr>

<td>${index+1}</td>

<td>${item.kode}</td>

<td>${item.pelaksana}</td>

<td>
Rp ${Number(item.nilai)
.toLocaleString("id-ID")}
</td>


<td>

<span class="badge ${warna}">
${item.status}
</span>

</td>


</tr>

`;

});


document.getElementById("data").innerHTML=tabel;







// RUNNING TEXT


let pesan="";


let belum =
spj.filter(x=>x.status=="Menunggu");


let kembali =
spj.filter(x=>x.status=="Revisi");



belum.forEach(x=>{

pesan +=
`⚠️ ${x.pelaksana} belum menyerahkan berkas ${x.kode} | `;

});



kembali.forEach(x=>{

pesan +=
`🔴 ${x.pelaksana} harus melakukan revisi ${x.kode} | `;

});



if(pesan==""){

pesan="✅ Semua SPJ sudah selesai diproses";

}



document.getElementById("runningText")
.innerHTML=pesan;



</script>
