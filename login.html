<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login Monitoring SPJ Satker</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
rel="stylesheet">

<style>

body{

background:#f4f6f9;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.card{

width:420px;

border:none;

border-radius:15px;

box-shadow:0 0 20px rgba(0,0,0,.15);

}

.card-header{

background:#0d6efd;

color:white;

text-align:center;

font-size:22px;

font-weight:bold;

padding:20px;

border-radius:15px 15px 0 0;

}

.logo{

font-size:60px;

color:#0d6efd;

margin-bottom:15px;

}

</style>

</head>

<body>

<div class="card">

<div class="card-header">

MONITORING SPJ SATKER

</div>

<div class="card-body p-4">

<div class="text-center">

<i class="fa-solid fa-user-shield logo"></i>

</div>

<div class="mb-3">

<label class="form-label">

Username

</label>

<input
type="text"
id="username"
class="form-control">

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<input
type="password"
id="password"
class="form-control">

</div>

<div class="d-grid">

<button
class="btn btn-primary"
id="btnLogin">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

</div>

<div
id="loginInfo"
class="text-danger text-center mt-3">

</div>

</div>

<div class="card-footer text-center">

© Monitoring SPJ Satker

</div>

</div>

<script src="js/login.js"></script>

</body>

</html>
