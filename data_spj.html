<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KEPUS - Data SPJ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


body{
background:#f4f6f9;
}


.container{
display:flex;
min-height:100vh;
}



.sidebar{

width:250px;
background:#1f2937;
color:white;
padding:20px;

}


.logo{

font-size:22px;
font-weight:bold;
margin-bottom:30px;

}



.sidebar a{

display:block;
color:white;
text-decoration:none;
padding:12px;
margin-bottom:8px;
border-radius:8px;

}



.sidebar a:hover{

background:#374151;

}



.main{

flex:1;
padding:20px;

}



.box{

background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px #ddd;

}



.top{

display:flex;
justify-content:space-between;
align-items:center;

}



button{

background:#2563eb;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;

}



input{

padding:10px;
width:300px;
border:1px solid #ddd;
border-radius:8px;

}



table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}


th,td{

padding:12px;
border-bottom:1px solid #ddd;

}



</style>


</head>



<body>



<div class="container">



<div class="sidebar">


<div class="logo">
KEPUS
</div>


<a href="index.html">
📊 Dashboard
</a>


<a href="data_spj.html">
📄 Data SPJ
</a>


<a href="tambah_spj.html">
➕ Tambah SPJ
</a>


<a href="verifikasi.html">
✅ Verifikasi
</a>


<a href="laporan.html">
📑 Laporan
</a>



</div>





<div class="main">



<div class="box">



<div class="top">


<h2>
Data SPJ
</h2>


<button onclick="tambah()">

➕ Tambah SPJ

</button>


</div>



<br>


<input 
id="cari"
onkeyup="cariData()"
placeholder="Cari Nomor Surat Tugas">





<table>


<thead>

<tr>

<th>No</th>

<th>No Surat Tugas</th>

<th>Tanggal</th>

<th>Pokja</th>

<th>Nilai</th>

<th>Status</th>

<th>Aksi</th>

</tr>


</thead>



<tbody id="tabelSPJ">


</tbody>



</table>



</div>



</div>



</div>






<script>



function tampil(){



let data =
JSON.parse(localStorage.getItem("dataSPJ")) || [];



let html="";



data.forEach((spj,index)=>{


html += `


<tr>


<td>${index+1}</td>


<td>${spj.nomorSuratTugas}</td>


<td>${spj.tanggalSuratTugas}</td>


<td>${spj.pokja}</td>


<td>Rp ${spj.nilaiSPJ}</td>


<td>${spj.status}</td>



<td>


<button onclick="detail(${index})">
👁
</button>


<button onclick="hapus(${index})">
🗑
</button>


</td>


</tr>


`;


});



document.getElementById("tabelSPJ")
.innerHTML=html;



}





function hapus(index){


let data =
JSON.parse(localStorage.getItem("dataSPJ")) || [];



if(confirm("Hapus data SPJ ini?")){


data.splice(index,1);


localStorage.setItem(
"dataSPJ",
JSON.stringify(data)
);



tampil();


}


}





function detail(index){


let data =
JSON.parse(localStorage.getItem("dataSPJ")) || [];



let spj=data[index];



alert(

"Surat Tugas : "+spj.nomorSuratTugas+
"\nPokja : "+spj.pokja+
"\nNilai : "+spj.nilaiSPJ+
"\nStatus : "+spj.status

);


}





function cariData(){



let kata =
document.getElementById("cari").value
.toLowerCase();



let baris =
document.querySelectorAll("#tabelSPJ tr");



baris.forEach(row=>{


row.style.display =
row.innerText.toLowerCase()
.includes(kata)
?"":"none";

});


}





function tambah(){


window.location.href="tambah_spj.html";


}





tampil();



</script>



</body>

</html>
