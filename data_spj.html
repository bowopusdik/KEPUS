<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KEPUS - Data SPJ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f4f6f9;
}


.container{
display:flex;
min-height:100vh;
}


.sidebar{

width:250px;

}

}


.sidebar a{

.sidebar a:hover{

.main{

}


input{

width:300px;

}



table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}


th{

background:#005baa;
color:white;

}


th,td{

padding:12px;
border-bottom:1px solid #ddd;

}



.status{

padding:6px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;

}



.menunggu{

background:#fff3cd;
color:#856404;

}


.revisi{

background:#fee2e2;
color:#991b1b;

}


.selesai{

background:#d1fae5;
color:#065f46;

}


.action button{

margin:2px;

}


</style>

</head>


<body>


<div class="container">



<div class="sidebar">


<div class="logo">
KEPUS
</div>


<a href="index.html">
📊 Dashboard
</a>


<a href="data_spj.html">
📄 Data SPJ
</a>


<a href="tambah_spj.html">
➕ Tambah SPJ
</a>


<a href="verifikasi.html">
✅ Verifikasi
</a>


<a href="laporan.html">
📑 Laporan
</a>


</div>






<div class="main">



<div class="box">


<div class="top">


<h2>
Data SPJ
</h2>


<button onclick="tambah()">
➕ Tambah SPJ
</button>


</div>


<br>


<input
id="cari"
onkeyup="cariData()"
placeholder="Cari nomor surat / pokja">






<table>


<thead>

<tr>

<th>No</th>

<th>No Surat Tugas</th>

<th>Tanggal</th>

<th>Pokja</th>

<th>Nilai</th>

<th>Verifikasi</th>

<th>Aksi</th>


</tr>


</thead>


<tbody id="tabelSPJ">


</tbody>


</table>



</div>


</div>


</div>






<script>




// LOAD DATA


function tampil(){


let data =
JSON.parse(localStorage.getItem("dataSPJ")) || [];



let html="";



data.forEach((spj,index)=>{


let status =
spj.status || "Menunggu";



let warna="menunggu";


if(status=="Revisi")
warna="revisi";


if(status=="Selesai")
warna="selesai";





html += `


<tr>


<td>${index+1}</td>


<td>${spj.nomorSuratTugas}</td>


<td>${spj.tanggalSuratTugas}</td>


<td>${spj.pokja}</td>


<td>
Rp ${Number(spj.nilaiSPJ)
.toLocaleString("id-ID")}
</td>




<td>


<select onchange="ubahStatus(${index},this.value)">



<option value="Menunggu"
${status=="Menunggu"?"selected":""}>

🟡 Menunggu SPJ

</option>



<option value="Revisi"
${status=="Revisi"?"selected":""}>

🔴 Revisi

</option>



<option value="Selesai"
${status=="Selesai"?"selected":""}>

🟢 Terverifikasi

</option>


</select>


<br>


<span class="status ${warna}">
${status}
</span>


</td>






<td class="action">


<button onclick="detail(${index})">
👁
</button>


<button onclick="hapus(${index})">
🗑
</button>


</td>



</tr>


`;



});




document
.getElementById("tabelSPJ")
.innerHTML=html;



}








// UBAH STATUS



function ubahStatus(index,status){



let data =
JSON.parse(localStorage.getItem("dataSPJ")) || [];



data[index].status=status;



localStorage.setItem(
"dataSPJ",
JSON.stringify(data)
);



// sinkron dengan dashboard

let spj =
JSON.parse(localStorage.getItem("spj")) || [];



if(spj[index]){

spj[index].status=status;


localStorage.setItem(
"spj",
JSON.stringify(spj)
);


}



tampil();


}







function hapus(index){



let data =
JSON.parse(localStorage.getItem("dataSPJ")) || [];



if(confirm("Hapus data SPJ ini?")){


data.splice(index,1);



localStorage.setItem(
"dataSPJ",
JSON.stringify(data)
);



tampil();


}

}





function detail(index){


let data =
JSON.parse(localStorage.getItem("dataSPJ")) || [];

let x=data[index];


alert(

"Nomor Surat : "+x.nomorSuratTugas+
"\nPokja : "+x.pokja+
"\nNilai : Rp "+x.nilaiSPJ+
"\nStatus : "+x.status

);


}







function cariData(){


let kata =
document
.getElementById("cari")
.value
.toLowerCase();



document
.querySelectorAll("#tabelSPJ tr")
.forEach(row=>{


row.style.display =
row.innerText
.toLowerCase()
.includes(kata)
?
""
:
"none";


});


}






function tambah(){

location.href=
"tambah_spj.html";

}




tampil();


</script>


</body>

</html>
