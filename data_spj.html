<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KEPUS - Data SPJ</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


body{
background:#f4f6f9;
}


.container{
display:flex;
min-height:100vh;
}



/* SIDEBAR */

.sidebar{

width:250px;
background:#1f2937;
color:white;
padding:20px;
transition:.3s;

}


.logo{

font-size:22px;
font-weight:bold;
margin-bottom:30px;

}


.sidebar a{

display:block;
color:white;
text-decoration:none;
padding:12px;
margin-bottom:8px;
border-radius:8px;

}


.sidebar a:hover,
.active-menu{

background:#374151;

}




/* MAIN */

.main{

flex:1;
padding:20px;

}


.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}


.menu{

display:none;
font-size:25px;
cursor:pointer;

}





/* CONTENT */

.box{

background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px #ddd;

}



.top{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}


button{

background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;

}




input,select{

padding:10px;
border:1px solid #ddd;
border-radius:8px;

}





table{

width:100%;
border-collapse:collapse;

}


th,td{

padding:12px;
border-bottom:1px solid #ddd;
text-align:left;

}



.status{

padding:5px 10px;
border-radius:20px;
font-size:12px;

}


.wait{

background:#fff3cd;
color:#856404;

}


.ok{

background:#d1fae5;
color:#065f46;

}


.rev{

background:#fee2e2;
color:#991b1b;

}





/* MOBILE */

@media(max-width:768px){


.sidebar{

position:fixed;
left:-260px;
height:100%;
z-index:10;

}


.sidebar.open{

left:0;

}


.menu{

display:block;

}


.top{

flex-direction:column;
gap:10px;

}


table{

font-size:12px;

}


}

</style>

</head>
